#
# Cloudflare Pages configuration for the main site deployment.
#
# Project: adamrybinski-com
# Deploy from this directory (static HTML/CSS/JS): blog-site/
#
# Usage:
#   cd blog-site
#   wrangler pages deploy . --project-name adamrybinski-com
