system: LiveKnowledge
version: "2.1"
knowledge_mode: additive_only

runtime_semantics: >
  answer_question: closed-world over supplied KB. LLM proposes and verifies
  candidate answers; abduce/revise loop on rejection; commit on verified.
  integrate_knowledge: Clingo checks merged satisfiability of KB ⊕ candidate.
  Verified candidates produce new immutable KB snapshots (in-memory).
  Contradictions cause rejection; the abduce/revise loop runs only when
  auto_revise=true (default for learn, false for integrate).

persistence_semantics: >
  Integration is purely in-memory — prior KB is not mutated. CLI persist step
  writes augmented KB to disk on success (default: overwrite source KB file).
  --out-kb writes augmented KB elsewhere. Failure never writes to disk.
  KB files are pure ASP facts and rules, no #show directives.

roles:
  - id: proposer
    name: llm_generator
  - id: verifier
    name: llm_verifier
  - id: abductive_revisor
    name: llm_revisor
  - id: solver
    name: clingo
  - id: knowledge_store
    name: kb_manager
  - id: orchestrator
    name: coordinator

artifacts:
  - id: question
    fields: [id, text]
  - id: knowledge_base
    fields: [id, sourcetext, aspprogram, metadata]
  - id: candidate_answer
    fields: [id, questionid, text, rationale]
  - id: candidate_knowledge
    fields: [id, aspprogram, notes]
  - id: external_source_text
    fields: [id, text]
  - id: critique
    fields: [id, targetid, issues, suggestions]
  - id: verification_report
    fields: [id, status: verified|rejected|failed, verifierkind: llm|clingo, reason, evidence, rawoutput]
  - id: abductive_hypothesis
    fields: [id, explanation, repairplan]
  - id: final_answer
    fields: [id, questionid, answertext]
  - id: integration_result
    fields: [id, success, message, updatedprogram]
  - id: loop_status
    fields: [id, flowid, iteration, maxiterations, bounded, escaped]
    note: id field is model-level normalization for artifact uniformity; the Python LoopStatus dataclass does not currently have an id field

orchestrator_artifacts:
  - id: knowledge_gap_report
    fields:
      - question
      - committed_answer
      - gap_rationale
      - target_predicates
      - target_review (optional): {drop: [pred/arity]}
      - status: [open, closed]
      - resolution (optional):
          predicates_checked: [pred/arity]
          predicates_found: [pred/arity]
          predicates_still_missing: [pred/arity]
          predicates_dropped: [pred/arity]
          related_predicates_found: {pred/arity: [pred/arity]}
          all_resolved: bool
    lifecycle:
      ask --gap-report -> status=open
      learn --fill-gap -> verify_gap_resolution -> resolve -> status=closed|open

invariants:
  - id: I-COMMIT-ANSWER-ONLY-IF-VERIFIED
    formula: "committed(final_answer) -> verified(candidate_answer)"
    note: pseudo-logic; not yet executable meta-logic in the same vocabulary as DSL-MAP facts
  - id: I-INTEGRATE-KNOWLEDGE-ONLY-IF-VERIFIED
    formula: "integrated(candidate_knowledge) -> verified(candidate_knowledge)"
    note: pseudo-logic; not yet executable meta-logic in the same vocabulary as DSL-MAP facts
  - id: I-CRITIQUE-MUST-TARGET-EXISTING-ARTIFACT
    formula: "critique(c) -> exists(a). artifact(a) and targets(c, a)"
    note: pseudo-logic; not yet executable meta-logic in the same vocabulary as DSL-MAP facts
  - id: I-LOOP-MUST-BE-BOUNDED-OR-ESCAPED
    formula: "active(loop) -> bounded(loop) or escaped(loop)"
    note: pseudo-logic; not yet executable meta-logic in the same vocabulary as DSL-MAP facts
  - id: I-QUESTION-TERMINATES
    formula: "question_received(q) -> eventually(answer_committed(q) or question_failed(q))"
    note: pseudo-logic; not yet executable meta-logic in the same vocabulary as DSL-MAP facts

primitives:
  - id: generate
    description: LLM → candidate_answer. rationale field MUST list missing predicates/topics (gap signal).
  - id: generate_knowledge
    description: LLM from external_source_text + kb → additive candidate_knowledge. No #show, no KB restatement. Optional gap_context as prioritisation hint.
  - id: critique
    description: Produce abductive_hypothesis + critique targeting existing artifact.
  - id: verify_answer
    description: LLM checks candidate_answer against KB. Returns verification_report.
  - id: verify_knowledge
    description: Clingo checks merged satisfiability of KB ⊕ candidate. Solo grounding fail on KB predicates is expected — proceed to merged check. Returns verification_report.
  - id: abduce_answer
  - id: abduce_knowledge
  - id: revise_answer
    description: Produce new immutable CandidateAnswer from hypothesis + critique.
  - id: revise_knowledge
    description: Produce new immutable CandidateKnowledge. No #show, no KB restatement.
  - id: integrate
    description: Apply verified candidate → new immutable KB snapshot. Redundancy check: skip if all lines already exist verbatim in KB.
  - id: commit
    description: Promote verified CandidateAnswer to FinalAnswer.
  - id: fail
    description: Raise FlowFailed.
  - id: answer
    description: Text field inside CandidateAnswer.

orchestrator_utilities:
  - id: verify_gap_resolution
    description: >
      Schema-presence check. Given target_predicates (minus target_review.drop),
      scan KB for exact pred/arity as head-of-rule or fact. Deterministic text scan
      (regex over KB program string). Not LLM-backed, not Clingo-backed.
      Reports: found, still_missing, dropped, related_predicates_found
      (same name, different arity — arity-drift detection). Does NOT verify
      semantic completeness. all_resolved=true iff still_missing (excl. dropped) empty.

guards:
  - id: G-VERIFICATION-FAILURE-RECOVERABLE
    expression: "is_recoverable_failure(verification_report)"
  - id: G-VERIFICATION-FAILURE-UNRECOVERABLE
    expression: "not is_recoverable_failure(verification_report)"

flows:
  - id: answer_question
    input: [question, knowledge_base]
    output: [final_answer]
    max_iterations: 3
    steps:
      - id: T-ANSWER-GENERATE
        role: proposer
        primitive: generate
        input: [question, knowledge_base]
        output: [candidate_answer]
      - id: C-ANSWER-VERIFY
        role: verifier
        primitive: verify_answer
        input: [candidate_answer, knowledge_base]
        output: [verification_report]
      - id: D-ANSWER-VERIFIED
        kind: decision
        branches:
          - condition: "verification_report.status == verified"
            goto: T-ANSWER-COMMIT
          - condition: "verification_report.status == rejected"
            goto: T-ANSWER-ABDUCE
          - condition: "verification_report.status == failed and G-VERIFICATION-FAILURE-RECOVERABLE"
            goto: T-ANSWER-ABDUCE
          - condition: "verification_report.status == failed and G-VERIFICATION-FAILURE-UNRECOVERABLE"
            goto: F-ANSWER-FAILED
      - id: T-ANSWER-ABDUCE
        role: abductive_revisor
        primitive: abduce_answer
        input: [question, knowledge_base, candidate_answer, verification_report]
        output: [abductive_hypothesis, critique]
      - id: T-ANSWER-REVISE
        role: proposer
        primitive: revise_answer
        input: [candidate_answer, abductive_hypothesis, critique]
        output: [candidate_answer]
        loop_to: C-ANSWER-VERIFY
      - id: T-ANSWER-COMMIT
        role: orchestrator
        primitive: commit
        input: [candidate_answer, verification_report]
        output: [final_answer]
        ensures: I-COMMIT-ANSWER-ONLY-IF-VERIFIED
      - id: F-ANSWER-FAILED
        kind: failure
        conditions: [iterations_exceeded, unrecoverable_verification_failure]

  - id: integrate_knowledge
    input: [candidate_knowledge, knowledge_base, auto_revise (optional, default true)]
    output: [integration_result, knowledge_base]
    max_iterations: 3
    steps:
      - id: T-KNOWLEDGE-VERIFY
        role: verifier
        primitive: verify_knowledge
        input: [candidate_knowledge, knowledge_base]
        output: [verification_report]
        semantics: Solve merged (kb ⊕ candidate). ok=False→failed, sat→verified, unsat→rejected
      - id: D-KNOWLEDGE-VERIFIED
        kind: decision
        branches:
          - condition: "verification_report.status == verified"
            goto: T-KNOWLEDGE-INTEGRATE
          - condition: "verification_report.status == rejected and auto_revise == true"
            goto: T-KNOWLEDGE-ABDUCE
          - condition: "verification_report.status == rejected and auto_revise == false"
            goto: F-KNOWLEDGE-FAILED
          - condition: "verification_report.status == failed and G-VERIFICATION-FAILURE-RECOVERABLE"
            goto: T-KNOWLEDGE-ABDUCE
          - condition: "verification_report.status == failed and G-VERIFICATION-FAILURE-UNRECOVERABLE"
            goto: F-KNOWLEDGE-FAILED
      - id: T-KNOWLEDGE-ABDUCE
        role: abductive_revisor
        primitive: abduce_knowledge
        input: [candidate_knowledge, knowledge_base, verification_report]
        output: [abductive_hypothesis, critique]
      - id: T-KNOWLEDGE-REVISE
        role: proposer
        primitive: revise_knowledge
        input: [candidate_knowledge, abductive_hypothesis, critique]
        output: [candidate_knowledge]
        loop_to: T-KNOWLEDGE-VERIFY
      - id: T-KNOWLEDGE-INTEGRATE
        role: knowledge_store
        primitive: integrate
        input: [candidate_knowledge, verification_report, knowledge_base]
        output: [integration_result, knowledge_base]
        ensures: I-INTEGRATE-KNOWLEDGE-ONLY-IF-VERIFIED
        postcondition: new_kb.aspprogram == kb.aspprogram ⊕ candidate_knowledge.aspprogram (non-redundant only)
        # ⊕ is notation for textual append of verified non-redundant additive fragment to KB program string. NOT a formal merge operator; reflects current Python behavior, not a stronger semantic guarantee.
      - id: F-KNOWLEDGE-FAILED
        kind: failure
        conditions: [iterations_exceeded, unrecoverable_verification_failure]
        semantics: auto_revise=false rejection also leads here; see D-KNOWLEDGE-VERIFIED branch.

flows_compositions:
  - id: learn
    description: Orchestrator composition. generate_knowledge → integrate_knowledge → persist → resolve_gaps → optional re-ask.
    input:
      - knowledge_base
      - external_source_text
      - question (optional; if absent, CLI extracts from source H1 or skips re-ask)
      - knowledge_gap_report (optional; target_predicates → gap_context for generate_knowledge)
    output:
      - knowledge_base (augmented)
      - final_answer (if re-ask runs)
    steps:
      - id: T-LEARN-GENERATE
        role: proposer
        primitive: generate_knowledge
        input: [external_source_text, knowledge_base, gap_context (optional)]
        output: [candidate_knowledge]
      - id: T-LEARN-INTEGRATE
        calls_flow: integrate_knowledge
        input: [candidate_knowledge, knowledge_base]
        output: [integration_result, knowledge_base (augmented)]
      - id: T-LEARN-PERSIST
        role: orchestrator
        semantics: Write augmented KB to disk. Default: overwrite --kb file. --out-kb writes elsewhere. Skipped on integration failure.
      - id: T-LEARN-RESOLVE-GAP
        utility: verify_gap_resolution
        optional: true
        skipped_when: [no knowledge_gap_report provided, integration failed]
        input: [knowledge_gap_report, knowledge_base (augmented)]
        output: [knowledge_gap_report (updated)]
      - id: T-LEARN-REASK
        calls_flow: answer_question
        optional: true
        skipped_when: [no question and no H1 in source, --skip-reask passed]
        input: [question, knowledge_base (augmented)]
        output: [final_answer, knowledge_gap_report (optional; from --gap-report flag)]

deferred_v22:
  artifacts:
    - solver_result       # raw Clingo output including unsat core
    - revision_plan       # retractions + insertions set
    - minimal_conflict_core # minimal UNSAT subset from Clingo
    - predicate_evolution_map # arity/schema migrations
    - session_state       # multi-shot solving state
    - kb_commit           # typed persistence snapshot
  primitives:
    - analyze_conflict    # given UNSAT merged, produce MUC
    - propose_revision    # given conflict, propose retractions/rewrites
    - apply_revision      # execute revision_plan, produce new KB
    - verify_gap_semantics # re-answer question to confirm gap closure
    - invent_predicate    # given arity drift, propose unified schema
    - rewrite_schema      # migrate old predicate uses to new schema
  sequence:
    - v2.2a: retraction + MUC analysis (analyze_conflict, propose_revision, apply_revision)
    - v2.2b: exception/default rewriting + abnormality predicates
    - v2.2c: predicate invention + schema migration (invent_predicate, rewrite_schema)
    - v2.2d: multi-shot session state (session_state, solver_result)
